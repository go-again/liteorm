version: "2"

run:
  timeout: 5m

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - misspell
    - unconvert
  exclusions:
    rules:
      # Tests and examples favour brevity over checking every Close()/Exec() error.
      - path: (_test\.go|examples/)
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
